<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILES - Welcome</title>
    <link rel="stylesheet" href="iles.css">
</head>
<body class="welcome-page">
    <header>
        <h1>Internship Logging Evaluation System</h1>
    </header>
    
    <div class="container">
        <div class="card">
            <div class="tabs">
                <button id="loginTab" class="tab active">Login</button>
                <button id="registerTab" class="tab">Register</button>
            </div>
            
            <div id="loginForm" class="login-form">
                <h2>Login</h2>
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <select id="loginRole">
                    <option>Select Role</option>
                    <option>Student</option>
                    <option>Workplace Supervisor</option>
                    <option>Academic Supervisor</option>
                    <option>Admin</option>
                </select>
                <button type="submit">Login</button>
            </div>
            
            <div id="registerForm" class="register-form" style="display: none;">
                <h2>Register</h2>
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
                <input type="text" id="regFullName" placeholder="Full Name" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <select id="regRole">
                    <option>Select Role</option>
                    <option>Student</option>
                    <option>Workplace Supervisor</option>
                    <option>Academic Supervisor</option>
                    <option>Admin</option>
                </select>
                <button type="submit">Register</button>
            </div>
        </div>
    </div>
    
    <script src="group12.js"></script>
</body>
</html>
