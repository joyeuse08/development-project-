<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILES - Welcome</title>
    <link rel="stylesheet" href="iles.css" />
  </head>
  <body class="welcome-page">
    <header>
      <h1>📘 Internship Logging Evaluation System</h1>
    </header>

    <div class="container">
      <div class="card">
        <div class="tabs">
          <button id="loginTab" class="tab active">🔐 Login</button>
          <button id="registerTab" class="tab">📝 Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginFormElement">
          <div id="loginForm" class="login-form">
            <h2>Welcome Back!</h2>
            <label>Select Username</label>
            <input
              type="text"
              id="loginUsername"
              placeholder="Username"
              required
            />

            <label>Enter Password</label>
            <div style="position: relative; width: 100%">
              <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
                style="width: 100%; padding-right: 45px; box-sizing: border-box"
              />
              <span
                onclick="togglePassword()"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  font-size: 18px;
                  color: #888;
                  user-select: none;
                "
                >👁️</span
              >
            </div>

            <label>Select Role</label>
            <select id="loginRole" required>
              <option value="">Select Role</option>
              <option value="Student">👨‍🎓 Student</option>
              <option value="Workplace Supervisor">
                🏢 Workplace Supervisor
              </option>
              <option value="Academic Supervisor">
                🎓 Academic Supervisor
              </option>
              <option value="Admin">👑 Admin</option>
            </select>
            <button type="submit">Login →</button>
          </div>
        </form>

        <!-- Register Form -->
        <form id="registerFormElement">
          <div id="registerForm" class="register-form" style="display: none">
            <h2>Create Account</h2>
            <p class="subtitle">Fill in the details to create your account</p>
            <label>Enter Username</label>
            <input
              type="text"
              id="regUsername"
              placeholder="Username"
              required
            />

            <label>Enter Password</label>
            <div style="position: relative; width: 100%">
              <input
                type="password"
                id="regPassword"
                placeholder="Password"
                required
                style="width: 100%; padding-right: 45px; box-sizing: border-box"
              />
              <span
                onclick="toggleRegPassword('regPassword')"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  font-size: 18px;
                  color: #888;
                  user-select: none;
                "
                >👁️</span
              >
            </div>

            <label>Confirm Password</label>
            <div style="position: relative; width: 100%">
              <input
                type="password"
                id="regConfirmPassword"
                placeholder="Confirm Password"
                required
                style="width: 100%; padding-right: 45px; box-sizing: border-box"
              />
              <span
                onclick="toggleRegPassword('regConfirmPassword')"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  font-size: 18px;
                  color: #888;
                  user-select: none;
                "
                >👁️</span
              >
            </div>

            <label>Enter Full Name</label>
            <input
              type="text"
              id="regFullName"
              placeholder="Full Name"
              required
            />
            <label>Enter Email</label>
            <input type="email" id="regEmail" placeholder="Email" required />
            <label>Select Role</label>
            <select id="regRole" required>
              <option value="">Select Role</option>
              <option value="Student">👨‍🎓 Student</option>
              <option value="Workplace Supervisor">
                🏢 Workplace Supervisor
              </option>
              <option value="Academic Supervisor">
                🎓 Academic Supervisor
              </option>
              <option value="Admin">👑 Admin</option>
            </select>
            <button type="submit">Register →</button>
          </div>
        </form>
      </div>
    </div>
  </body>
  <script src="group12.js"></script>
</html>
