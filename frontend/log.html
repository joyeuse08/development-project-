<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Weekly Log</title>
    <script src="group12.js"></script>
    <link rel="stylesheet" href="iles.css" />
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <h1>Submit Weekly Log</h1>
      </div>
      <div class="user-info">
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="container">
      <!-- Welcome Banner -->
      <div class="welcome-banner">
        <div class="welcome-text">
          <h2>Welcome, <span id="welcomeName">Student</span>! 👋</h2>
          <p>Document your weekly internship activities and progress</p>
        </div>
        <div class="stats-badge">
          <div class="number" id="totalLogs">0</div>
          <div class="label">Total Logs</div>
        </div>
      </div>

      <!-- Submit Log Form -->
      <div class="form-card">
        <div class="form-header">
          <i class="fas fa-pen-alt"></i>
          <h2>Submit Weekly Log</h2>
          <p>Week <span id="currentWeek"></span></p>
        </div>
        <div class="form-body">
          <form id="logForm">
            <div class="form-row">
              <div class="form-group">
                <label>Week Number <span class="required">*</span></label>
                <input
                  type="number"
                  id="weekNumber"
                  placeholder="Enter week number (1-52)"
                  min="1"
                  max="52"
                  required
                />
              </div>
              <div class="form-group">
                <label> Date</label>
                <input type="date" id="logDate" />
              </div>
            </div>

            <div class="form-group">
              <label>Activities Done <span class="required">*</span></label>
              <textarea
                id="activities"
                placeholder="Describe the activities you worked on this week..."
                rows="4"
                required
              ></textarea>
              <div class="char-counter">
                <span id="activitiesCount">0</span> characters
              </div>
            </div>

            <div class="form-group">
              <label>Challenges Faced <span class="required">*</span></label>
              <textarea
                id="challenges"
                placeholder="What challenges did you encounter? How did you overcome them?"
                rows="3"
                required
              ></textarea>
              <div class="char-counter">
                <span id="challengesCount">0</span> characters
              </div>
            </div>

            <div class="form-group">
              <label>Key Learnings & Takeaways</label>
              <textarea
                id="learnings"
                placeholder="What new skills or knowledge did you gain this week?"
                rows="3"
              ></textarea>
              <div class="char-counter">
                <span id="learningsCount">0</span> characters
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Hours Worked</label>
                <input
                  type="number"
                  id="hoursWorked"
                  placeholder="Total hours this week"
                  step="0.5"
                  min="0"
                />
              </div>
              <div class="form-group">
                <label>Goals Achieved Weekly</label>
                <select id="goalAchieved">
                  <option value="">Select</option>
                  <option value="yes">✅ Yes, fully achieved</option>
                  <option value="partial">Partially achieved</option>
                  <option value="no">Not achieved</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn-submit">Submit Weekly Log</button>
          </form>
        </div>
      </div>
      <!-- My Logs Section -->
      <div class="logs-card">
        <div class="logs-header">
          <h2>My Submitted Logs</h2>
          <i class="fas fa-chevron-down" style="cursor: pointer"></i>
        </div>
        <div class="filter-bar">
          <select id="statusFilter" class="filter-select">
            <option value="all">All Status</option>
            <option value="pending">Pending Review</option>
            <option value="reviewed_by_workplace">Workplace Reviewed</option>
            <option value="approved">Approved</option>
          </select>
          <select id="weekFilter" class="filter-select">
            <option value="all">All Weeks</option>
          </select>
        </div>
        <div id="logsContainer" class="logs-container">
          <!-- Logs will be loaded here -->
          <div class="empty-state">
            <div class="empty-state-icon"></div>
            <p>No logs submitted yet</p>
            <p style="font-size: 0.8rem">
              Use the form above to submit your first weekly log!
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
