<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILES - Academic Supervisor</title>
    <link rel="stylesheet" href="iles.css" />
  </head>
  <body class="academic-page">
    <header>
      <h1>Academic Supervisor Dashboard</h1>
    </header>

    <div class="container">
      <div id="userInfo" class="user-info"></div>

      <div class="card academic-review-form">
        <h2>Review Student Log</h2>
        <form id="academicReviewForm">
          <select id="academicStudentSelect" required>
            <option>Select Student</option>
          </select>
          <select id="academicWeekSelect" required>
            <option>Select Week</option>
          </select>
          <textarea>
            id="academicFeedback"
            placeholder="Write feedback..."
            rows="4"
            required
            <div id="workplaceFeedbackDisplay" style="display:none;"></div>
          ></textarea>
          <input
            type="number"
            id="academicScore"
            placeholder="Score (0-10)"
            step="0.1"
            required
          />
          <button type="submit">Submit Review</button>
        </form>
      </div>

      <div id="pendingLogs" class="pending-container"></div>
    </div>

    <script src="group12.js"></script>
  </body>
</html>
