<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILES - Workplace Supervisor</title>
    <link rel="stylesheet" href="iles.css" />
  </head>
  <body class="workplace-page">
    <header>
      <h1>Workplace Supervisor Dashboard</h1>
    </header>

    <div class="container">
      <div id="userInfo" class="user-info"></div>

      <div class="card review-form">
        <h2>Review Student Log</h2>
        <form id="reviewForm">
          <select id="studentSelect" required>
            <option value"" disabled selected>Select Student</option>
          </select>
          <select id="weekSelect" required>
            <option value"" disabled selected>Select Week</option>
          </select>
          <textarea
            id="feedback"
            placeholder="Write feedback..."
            rows="4"
            required
          ></textarea>
          <input
            type="number"
            id="score"
            placeholder="Score (0-10)"
            step="0.1"
            required
          />
          <button type="submit">Submit Review</button>
        </form>
      </div>

      <div id="pendingLogs" class="pending-container"></div>
    </div>

    <script src="group12.js"></script>
  </body>
</html>
